stages:
  - test
  - report

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip
    - .venv

test:
  stage: test
  image: python:3.13
  variables:
    PATH: "$HOME/.local/bin:$PATH"
    OCTOPUS_BASE_URL: http://api.wxorder.taover.com
    OCTOPUS_USERNAME: $OCTOPUS_USERNAME
    OCTOPUS_PASSWORD: $OCTOPUS_PASSWORD
  before_script:
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - uv sync
  script:
    - uv run pytest tests/test_octopus/ -v --alluredir=reports/allure-results
  artifacts:
    when: always
    paths:
      - reports/allure-results

generate_report:
  stage: report
  image: frankescobar/allure-docker-service
  when: always
  dependencies:
    - test
  script:
    - allure generate reports/allure-results -o reports/allure-report --clean
  artifacts:
    paths:
      - reports/allure-report

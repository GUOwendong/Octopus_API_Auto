name: UV-Pytest-Allure CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: uv 同步依赖
        run: uv sync --frozen

      - name: 安装 Allure
        uses: simple-elf/allure-report-action@master
        with:
          allure_version: 2.25.0

      - name: 执行测试生成Allure结果
        id: test_run
        run: |
          uv run pytest --alluredir=allure-results
          echo "EXIT_CODE=$?" >> $GITHUB_OUTPUT

      - name: 生成Allure静态报告
        run: allure generate allure-results -o allure-report --clean

      - name: 上传Allure报告
        uses: actions/upload-artifact@v4
        with:
          name: allure-static-report
          path: allure-report

      - name: 钉钉通知
        env:
          DING_WEBHOOK: ${{ secrets.DING_WEBHOOK }}
          EXIT_CODE: ${{ steps.test_run.outputs.EXIT_CODE }}
        run: |
          if [ $EXIT_CODE -eq 0 ]; then
            MSG="✅ GitHub Actions 自动化测试通过
分支：${{ github.ref_name }}
提交SHA：${{ github.sha }}
状态：全部用例执行成功"
          else
            MSG="❌ GitHub Actions 自动化测试失败
分支：${{ github.ref_name }}
提交SHA：${{ github.sha }}
状态：存在失败用例，请及时排查"
          fi

          curl -s -X POST "$DING_WEBHOOK" \
          -H "Content-Type: application/json" \
          -d "{\"msgtype\":\"text\",\"text\":{\"content\":\"$MSG\"}}"
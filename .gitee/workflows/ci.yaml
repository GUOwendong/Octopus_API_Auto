name: Interface Automation CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: python-3.13
    steps:
      - checkout: self

      - name: 安装 uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.cargo/bin:$PATH"

      - name: 安装依赖
        run: |
          uv sync

      - name: 运行测试并生成 Allure 结果
        run: |
          uv run pytest tests/test_octopus/ -v --alluredir=reports/allure-results
        env:
          OCTOPUS_BASE_URL: http://api.wxorder.taover.com
          OCTOPUS_TOKEN: ${{ secrets.OCTOPUS_TOKEN }}

      - name: 归档 Allure 结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: reports/allure-results
